name: Deploy to HakuLess.github.io

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  deployments: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Set Node.js 24 environment
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: npm ci
      
      - name: Clear cache
        run: rm -rf docs/.vuepress/dist docs/.vuepress/.cache docs/.vuepress/.temp
      
      - name: Build docs
        run: npm run docs:build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.PAT_TOKEN_V2 }}
          external_repository: HakuLess/HakuLess.github.io
          publish_dir: ./docs/.vuepress/dist
          publish_branch: master
          force_orphan: true
